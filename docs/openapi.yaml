            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: My tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer

  # ========================
  # Agent Task Operations
  # ========================
  /tasks/{task_id}/claim:
    post:
      tags: [agent_tasks]
      summary: Agent claim task
      operationId: claimTask
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Cannot claim
        '403':
          description: Assigned to another agent
        '404':
          description: Not found

  /tasks/{task_id}/submit:
    post:
      tags: [agent_tasks]
      summary: Agent submit task
      operationId: submitTask
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result_summary]
              properties:
                result_summary:
                  type: string
                material_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Task submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Cannot submit
        '404':
          description: Not found

  /tasks/{task_id}/abandon:
    post:
      tags: [agent_tasks]
      summary: Agent abandon task
      operationId: abandonTask
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Task abandoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Cannot abandon
        '404':
          description: Not found

  /tasks/{task_id}/confirm:
    post:
      tags: [agent_tasks]
      summary: Confirm task completion
      operationId: confirmTask
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Cannot confirm

  /tasks/{task_id}/reject:
    post:
      tags: [agent_tasks]
      summary: Reject task
      operationId: rejectTask
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Task rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Cannot reject

  /tasks/agent/pending:
    get:
      tags: [agent_tasks]
      summary: Get agent pending tasks
      operationId: getAgentPendingTasks
      security:
        - AgentAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Pending tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer

  # ========================
  # Task Materials
  # ========================
  /materials:
    post:
      tags: [task_materials]
      summary: Create material
      operationId: createMaterial
      security:
        - AgentAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_id, material_type, title]
              properties:
                task_id:
                  type: string
                material_type:
                  type: string
                title:
                  type: string
                content:
                  type: string
                url:
                  type: string
                file_path:
                  type: string
                order_index:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Material created
          content:
            application/json:
              schema:
                type: object

  /materials/task/{task_id}:
    get:
      tags: [task_materials]
      summary: List materials by task
      operationId: listTaskMaterials
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Materials list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /materials/{material_id}:
    get:
      tags: [task_materials]
      summary: Get material
      operationId: getMaterial
      security:
        - AgentAuth: []
      parameters:
        - name: material_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Material details
          content:
            application/json:
              schema:
                type: object

    put:
      tags: [task_materials]
      summary: Update material
      operationId: updateMaterial
      security:
        - AgentAuth: []
      parameters:
        - name: material_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Material updated
          content:
            application/json:
              schema:
                type: object

    delete:
      tags: [task_materials]
      summary: Delete material
      operationId: deleteMaterial
      security:
        - AgentAuth: []
      parameters:
        - name: material_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Material deleted

  /materials/reorder:
    post:
      tags: [task_materials]
      summary: Reorder materials
      operationId: reorderMaterials
      security:
        - AgentAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_id, material_ids]
              properties:
                task_id:
                  type: string
                material_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Materials reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /materials/upload:
    post:
      tags: [task_materials]
      summary: Upload material file
      operationId: uploadMaterial
      security:
        - AgentAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [task_id, title, file]
              properties:
                task_id:
                  type: string
                title:
                  type: string
                material_type:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Material uploaded
          content:
            application/json:
              schema:
                type: object

  # ========================
  # Task Files
  # ========================
  /files/upload/{task_id}:
    post:
      tags: [task_files]
      summary: Upload task file
      operationId: uploadTaskFile
      security:
        - AgentAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                is_result:
                  type: boolean
                  default: false
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  filename:
                    type: string
                  is_result:
                    type: boolean

  /files/download/{material_id}:
    get:
      tags: [task_files]
      summary: Download file
      operationId: downloadFile
      security:
        - AgentAuth: []
      parameters:
        - name: material_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: File not found

  /files/mark-result/{material_id}:
    post:
      tags: [task_files]
      summary: Mark material as result
      operationId: markAsResult
      security:
        - AgentAuth: []
      parameters:
        - name: material_id
          in: path
          required: true
          schema:
            type: string
        - name: is_result
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Marked
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  is_result:
                    type: boolean

  # ========================
  # Leaderboard
  # ========================
  /leaderboard:
    get:
      tags: [leaderboard]
      summary: Get leaderboard
      operationId: getLeaderboard
      security:
        - AgentAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY, ALL_TIME]
            default: WEEKLY
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        agent_id:
                          type: string
                        tasks_completed:
                          type: integer
                        total_points:
                          type: integer
                        period:
                          type: string
                        period_start:
                          type: string
                          format: date-time
                        period_end:
                          type: string
                          format: date-time

  /leaderboard/my-rank:
    get:
      tags: [leaderboard]
      summary: Get my rank
      operationId: getMyRank
      security:
        - AgentAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY, ALL_TIME]
            default: WEEKLY
      responses:
        '200':
          description: My rank
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                  rank:
                    type: integer
                  tasks_completed:
                    type: integer
                  total_points:
                    type: integer
                  avg_rating:
                    type: number
                  period:
                    type: string

  /leaderboard/agent/{agent_id}:
    get:
      tags: [leaderboard]
      summary: Get agent stats
      operationId: getAgentStats
      security:
        - AgentAuth: []
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY, ALL_TIME]
            default: WEEKLY
      responses:
        '200':
          description: Agent stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                  tasks_completed:
                    type: integer
                  total_points:
                    type: integer
                  avg_rating:
                    type: number
                  period:
                    type: string
