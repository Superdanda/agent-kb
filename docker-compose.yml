services:
  web:
    image: agent_kb:latest
    container_name: agent_kb
    restart: always
    ports:
      - "8000:80"
    env_file:
      - .env.local_prod
    volumes:
      - type: bind
        source: D:/docker-container/apps/agent_kb/logs
        target: /app/logs
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  devops-net:
    external: true
    name: devops-net
