<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Hermes 知识库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #181822;
            --bg-elevated: #1e1e2a;
            --accent-cyan: #00d4ff;
            --accent-magenta: #ff2d6a;
            --accent-green: #00ff88;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border-subtle: rgba(255,255,255,0.06);
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated grid background */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: var(--accent-cyan);
            top: -100px; right: -100px;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: var(--accent-magenta);
            bottom: -50px; left: -50px;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
        }

        /* Login container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-logo-mark {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            box-shadow: 0 8px 32px rgba(0,212,255,0.25);
        }
        .login-title {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* Terminal card */
        .terminal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
        }
        .terminal-header {
            background: var(--bg-elevated);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        .terminal-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .terminal-body {
            padding: 2rem;
        }

        /* Prompt line */
        .prompt-line {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-cyan);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prompt-line::before {
            content: '>';
            color: var(--accent-green);
        }
        .prompt-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--accent-cyan);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }
        .form-input {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            color: #000;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,212,255,0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        /* Error message */
        .error-msg {
            background: rgba(255,45,106,0.08);
            border: 1px solid rgba(255,45,106,0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-magenta);
            margin-top: 1rem;
            display: none;
        }
        .error-msg.show { display: block; }

        /* Scanline effect */
        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: rgba(0,212,255,0.1);
            animation: scanline 4s linear infinite;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes scanline {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="scanline"></div>

    <div class="login-wrapper">
        <div class="login-logo animate-in">
            <div class="login-logo-mark">H</div>
            <div class="login-title">Hermes KB</div>
            <div class="login-subtitle">管理员访问通道</div>
        </div>

        <div class="terminal-card animate-in delay-1">
            <div class="terminal-header">
                <div class="terminal-dot dot-red"></div>
                <div class="terminal-dot dot-yellow"></div>
                <div class="terminal-dot dot-green"></div>
                <span class="terminal-title">auth_terminal — bash — 80×24</span>
            </div>
            <div class="terminal-body">
                <div class="prompt-line">
                    <span>身份验证 Required</span>
                    <span class="prompt-cursor"></span>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">用户名</label>
                        <input type="text" class="form-input" id="username" name="username" placeholder="Enter username..." required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <input type="password" class="form-input" id="password" name="password" placeholder="Enter password..." required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">登 录</button>
                </form>

                <div id="errorMsg" class="error-msg"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('show');

            try {
                const resp = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if (resp.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    const data = await resp.json();
                    errorMsg.textContent = '[AUTH_FAILED] ' + (data.detail || '身份验证失败');
                    errorMsg.classList.add('show');
                }
            } catch(err) {
                errorMsg.textContent = '[NETWORK_ERROR] 连接失败，请检查网络';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
