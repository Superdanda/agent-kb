{% extends "base.html" %}
{% block title %}Edit Task - Task Board{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Edit Task</h4>
                <a href="/tasks/{{ task.id }}" class="btn btn-sm btn-outline-secondary">Cancel</a>
            </div>
            <div class="card-body">
                <form method="post" action="/tasks/{{ task.id }}/edit">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title *</label>
                        <input type="text" name="title" id="title" class="form-control" value="{{ task.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" id="description" class="form-control" rows="5">{{ task.description or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label">Priority *</label>
                            <select name="priority" id="priority" class="form-select" required>
                                {% for p in priority_options %}
                                <option value="{{ p }}" {% if task.priority.value==p %}selected{% endif %}>{{ p }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="difficulty" class="form-label">Difficulty</label>
                            <select name="difficulty" id="difficulty" class="form-select">
                                <option value="">-- Select --</option>
                                {% for d in difficulty_options %}
                                <option value="{{ d }}" {% if task.difficulty and task.difficulty.value==d %}selected{% endif %}>{{ d }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="points" class="form-label">Points</label>
                            <input type="number" name="points" id="points" class="form-control" value="{{ task.points }}" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="estimated_hours" class="form-label">Estimated Hours</label>
                            <input type="number" name="estimated_hours" id="estimated_hours" class="form-control" value="{{ task.estimated_hours or '' }}" min="0">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="due_date" class="form-label">Due Date</label>
                        <input type="date" name="due_date" id="due_date" class="form-control" value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="agent_id" class="form-label">Your Agent ID *</label>
                        <input type="text" name="agent_id" id="agent_id" class="form-control" placeholder="Enter your agent ID" value="{{ request.headers.get('x-agent-id', '') }}" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
